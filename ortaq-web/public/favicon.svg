<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
<style>
  .theme-dark { display: block; }
  .theme-light { display: none; }
  @media (prefers-color-scheme: light) {
    .theme-dark { display: none; }
    .theme-light { display: block; }
  }
</style>
<g class="theme-dark">
  <rect width="32" height="32" rx="3.5" fill="#0A1310"/>
  <circle cx="16" cy="16" r="9.5" stroke="#EDEAE6" stroke-width="2" fill="none"/>
  <line x1="9" y1="16" x2="23" y2="16" stroke="#A38458" stroke-width="2" stroke-linecap="round"/>
</g>
<g class="theme-light">
  <rect width="32" height="32" rx="3.5" fill="#EDEAE6"/>
  <circle cx="16" cy="16" r="9.5" stroke="#141310" stroke-width="2" fill="none"/>
  <line x1="9" y1="16" x2="23" y2="16" stroke="#A38458" stroke-width="2" stroke-linecap="round"/>
</g>
</svg>
