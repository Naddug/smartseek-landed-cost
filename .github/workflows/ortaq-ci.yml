name: ORTAQ CI

on:
  push:
    branches: [main, develop, staging/predeploy-final]
    paths:
      - "ortaq-v2/**"
      - "ortaq-web/**"
      - "ortaq-api/**"
      - "ortaq-shared/**"
      - ".github/workflows/ortaq-ci.yml"
  pull_request:
    paths:
      - "ortaq-v2/**"
      - "ortaq-web/**"
      - "ortaq-api/**"
      - "ortaq-shared/**"

concurrency:
  group: ortaq-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ortaq-v2:
    name: ortaq-v2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ortaq-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ortaq-v2/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          NEXTAUTH_URL: https://ortaq.biz
          NEXTAUTH_SECRET: ci-build-placeholder-secret

  ortaq-web:
    name: ortaq-web (archived)
    if: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ortaq-web
    steps:
      - uses: actions/checkout@v4
      - run: echo "ortaq-web archived — production is ortaq-v2"

  ortaq-api:
    name: ortaq-api
    if: ${{ hashFiles('ortaq-api/package-lock.json') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ortaq-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ortaq-api/package-lock.json
      - run: npm ci
      - run: npm run check
