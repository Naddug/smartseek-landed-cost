name: ORTAQ CI

on:
  push:
    branches: [main, develop, staging/predeploy-final]
    paths:
      - "ortaq-web/**"
      - "ortaq-api/**"
      - "ortaq-shared/**"
      - ".github/workflows/ortaq-ci.yml"
  pull_request:
    paths:
      - "ortaq-web/**"
      - "ortaq-api/**"
      - "ortaq-shared/**"

concurrency:
  group: ortaq-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ortaq-web:
    name: ortaq-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ortaq-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ortaq-web/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run validate:prod
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging/predeploy-final'
      - run: npm run build
        if: github.ref != 'refs/heads/main'
        env:
          NEXT_PUBLIC_APP_ENV: staging
          NEXT_PUBLIC_SITE_URL: https://staging.ortaq.biz

  ortaq-api:
    name: ortaq-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ortaq-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ortaq-api/package-lock.json
      - run: npm ci
      - run: npm run check
